<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#6750A4">
  <meta name="description" content="Qtine - 轻量、可扩展的模块化聊天机器人框架">
  <link rel="icon" href="/docs/public/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <title>Qtine · 模块化聊天机器人框架</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

  <!-- ========== 顶部导航栏 ========== -->
  <header class="topbar" id="topbar">
    <button class="topbar__menu-btn" id="menu-btn" aria-label="菜单">
      <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </button>

    <div class="topbar__brand">
      <img id="brand-logo" alt="Qtine Logo">
      <span class="topbar__brand-text" id="brand-text">Qtine <span class="accent">文档</span></span>
    </div>

    <nav class="topbar__nav" id="topbar-nav"></nav>

    <div class="topbar__spacer"></div>

    <button class="topbar__search-btn" id="search-btn" aria-label="搜索">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    </button>

    <button class="topbar__theme-btn" id="theme-btn" aria-label="切换主题">
      <svg class="theme-icon" id="theme-icon" viewBox="0 0 24 24">
        <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM12 2c-.55 0-1 .45-1 1v1c0 .55.45 1 1 1s1-.45 1-1V3c0-.55-.45-1-1-1zm0 17c-.55 0-1 .45-1 1v1c0 .55.45 1 1 1s1-.45 1-1v-1c0-.55-.45-1-1-1zm11-8c0-.55-.45-1-1-1h-1c-.55 0-1 .45-1 1s.45 1 1 1h1c.55 0 1-.45 1-1zM4 11c0-.55-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1h1c.55 0 1-.45 1-1zm15.66-7.07c-.39-.39-1.02-.39-1.41 0l-.71.71c-.39.39-.39 1.02 0 1.41.39.39 1.02.39 1.41 0l.71-.71c.39-.39.39-1.02 0-1.41zM6.34 19.07c.39-.39.39-1.02 0-1.41-.39-.39-1.02-.39-1.41 0l-.71.71c-.39.39-.39 1.02 0 1.41.39.39 1.02.39 1.41 0l.71-.71zm14.32 0l-.71-.71c-.39-.39-1.02-.39-1.41 0-.39.39-.39 1.02 0 1.41l.71.71c.39.39 1.02.39 1.41 0 .39-.39.39-1.02 0-1.41zM6.34 4.93l-.71-.71c-.39-.39-1.02-.39-1.41 0-.39.39-.39 1.02 0 1.41l.71.71c.39.39 1.02.39 1.41 0 .39-.39.39-1.02 0-1.41z"/>
      </svg>
    </button>
  </header>

  <!-- ========== 布局 ========== -->
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">
      <div class="content" id="content">
        <div class="loading"><div class="loading__spinner"></div></div>
      </div>
    </main>
  </div>

  <!-- ========== 遮罩 ========== -->
  <div class="scrim" id="scrim"></div>

  <!-- ========== FAB 回到顶部 ========== -->
  <button class="fab" id="fab" aria-label="回到顶部">
    <svg viewBox="0 0 24 24"><path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8-8 8z"/></svg>
  </button>

  <!-- ========== 搜索对话框 ========== -->
  <div class="search-dialog" id="search-dialog">
    <div class="search-dialog__panel">
      <div class="search-dialog__input-wrap">
        <svg style="width:24px;height:24px;fill:var(--md-on-surface-variant)" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" class="search-dialog__input" id="search-input" placeholder="搜索文档...">
        <button class="search-dialog__close" id="search-close" aria-label="关闭">
          <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div class="search-dialog__results" id="search-results"></div>
    </div>
  </div>

  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/app.js"></script>
</body>
</html>
